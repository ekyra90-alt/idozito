<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dalangol Időzítő</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body{font-family:system-ui,sans-serif}
  .active-line{border-color:#7c3aed!important;background:#f5f3ff!important}
  input[type=number]{-moz-appearance:textfield}
</style>
</head>
<body class="bg-slate-50 text-slate-800">

<div class="max-w-2xl mx-auto p-3 pb-24">

  <h1 class="text-xl font-black mb-3 text-violet-700">🎧 Dalangol Időzítő</h1>

  <!-- Hangfájl + vezérlés -->
  <div class="sticky top-0 bg-slate-50 z-20 pb-3 border-b border-slate-200 mb-4">
    <input type="file" id="audioInput" accept="audio/*" class="w-full mb-2 p-2 border rounded-lg bg-white text-sm">
    <audio id="audio" controls class="w-full mb-2"></audio>
    <div class="flex gap-2">
      <button onclick="seek(-5)" class="flex-1 bg-slate-200 py-2 rounded-lg font-bold">-5s</button>
      <button onclick="seek(5)" class="flex-1 bg-slate-200 py-2 rounded-lg font-bold">+5s</button>
      <button onclick="togglePlay()" id="playBtn" class="flex-1 bg-violet-600 text-white py-2 rounded-lg font-bold">▶ Lejátszás</button>
    </div>
  </div>

  <!-- Dal metaadatok -->
  <div class="bg-white border rounded-xl p-3 mb-4 space-y-2">
    <h2 class="font-bold text-sm text-slate-500">Dal adatai</h2>
    <input id="songId" placeholder="dal id (pl. hipochondria)" class="w-full border p-2 rounded text-sm">
    <input id="songTitle" placeholder="Dal címe" class="w-full border p-2 rounded text-sm">
    <input id="mp3name" placeholder="mp3 fájlnév (pl. Hipochondria.mp3)" class="w-full border p-2 rounded text-sm">
    <input id="fallback" placeholder="Tartalék mp3 link (csak ha külső szerveren is van, egyébként hagyd üresen)" class="w-full border p-2 rounded text-sm">
  </div>

  <!-- Szövegbevitel -->
  <div class="bg-white border rounded-xl p-3 mb-4">
    <h2 class="font-bold text-sm text-slate-500 mb-2">Dalszöveg bevitele</h2>
    <p class="text-xs text-slate-400 mb-2">
      Új versszak: írj egy önálló sort <code class="bg-slate-100 px-1">|</code> jel NÉLKÜL (pl. <code class="bg-slate-100 px-1">Refrén</code> vagy <code class="bg-slate-100 px-1">## Refrén</code>)<br>
      Énekelt sor: <code class="bg-slate-100 px-1">angol szöveg | magyar fordítás</code>
    </p>
    <textarea id="lyricInput" class="w-full h-40 border p-2 rounded-lg font-mono text-xs" placeholder="Bevezető
I check my body every hour. | Minden órában ellenőrzöm a testem.
I feel I lose my physical power. | Érzem, hogy elveszítem a fizikai erőmet.

Refrén
I am terribly **unwell** tonight, | Szörnyen rosszul vagyok ma éjjel,
..."></textarea>
    <button onclick="parseLyrics()" class="w-full mt-2 bg-slate-800 text-white py-2 rounded-lg font-bold">Betöltés / Frissítés</button>
  </div>

  <!-- Sorok listája -->
  <div id="verseList" class="space-y-4 mb-4"></div>

  <!-- Dal vége -->
  <div class="bg-white border rounded-xl p-3 mb-4 flex items-center gap-2">
    <label class="text-sm font-bold text-slate-500 flex-shrink-0">Utolsó sor vége (mp):</label>
    <input type="number" step="0.1" id="songEnd" class="border p-2 rounded w-28 text-sm" onchange="render()">
    <button onclick="document.getElementById('songEnd').value = audio.currentTime.toFixed(1); render();" class="bg-yellow-500 text-white px-3 py-2 rounded-lg text-sm font-bold">MOST</button>
  </div>

  <!-- Export -->
  <div class="bg-white border rounded-xl p-3">
    <h2 class="font-bold mb-2">Exportálás (illeszd be az adat.js-be)</h2>
    <textarea id="exportArea" class="w-full h-56 p-2 border rounded font-mono text-xs mb-2 bg-slate-50"></textarea>
    <div class="grid grid-cols-2 gap-2">
      <button onclick="exportData()" class="bg-purple-600 text-white py-2 rounded-lg font-bold">Export frissítése</button>
      <button onclick="copyExport()" class="bg-green-600 text-white py-2 rounded-lg font-bold">Másolás</button>
    </div>
  </div>

</div>

<script>
const audio = document.getElementById('audio');
let verses = []; // [{title, lines:[{text,hungarian,start}]}]

document.getElementById('audioInput').onchange = (e) => {
  if (e.target.files.length > 0) {
    audio.src = URL.createObjectURL(e.target.files[0]);
  }
};
audio.onloadedmetadata = () => {
  const endInput = document.getElementById('songEnd');
  if (!endInput.value) endInput.value = audio.duration.toFixed(1);
};
audio.ontimeupdate = highlightActive;

function seek(d){ audio.currentTime = Math.max(0, audio.currentTime + d); }
function togglePlay(){
  if (audio.paused){ audio.play(); document.getElementById('playBtn').textContent = '⏸ Szünet'; }
  else { audio.pause(); document.getElementById('playBtn').textContent = '▶ Lejátszás'; }
}

function parseLyrics(){
  const raw = document.getElementById('lyricInput').value.split('\n');
  const newVerses = [];
  let current = null;
  raw.forEach(rawLine => {
    const line = rawLine.trim();
    if (!line) return;
    if (line.includes('|')) {
      // sor angol | magyar formátumban -> énekelt sor
      if (!current) { current = { title: 'Versszak', lines: [] }; newVerses.push(current); }
      const parts = line.split('|');
      const text = parts[0].trim();
      const hungarian = (parts[1] || '').trim();
      current.lines.push({ text, hungarian, start: null });
    } else {
      // nincs benne "|" -> versszak/refrén cím (## opcionális, csak dísz)
      current = { title: line.replace(/^##\s*/, ''), lines: [] };
      newVerses.push(current);
    }
  });

  // meglévő időzítések megtartása, ha a szöveg egyezik (frissítéskor ne vesszen el)
  newVerses.forEach((v, vi) => {
    v.lines.forEach((l, li) => {
      const oldV = verses[vi];
      const oldL = oldV && oldV.lines[li];
      if (oldL && oldL.text === l.text) l.start = oldL.start;
    });
  });

  verses = newVerses;
  render();
}

function flatLines(){
  const flat = [];
  verses.forEach((v, vi) => v.lines.forEach((l, li) => flat.push({v, l, vi, li})));
  return flat;
}

function computeEnds(){
  // egy sor vége = a KÖVETKEZŐ MÁR IDŐZÍTETT sor eleje; ha nincs több időzített sor, a dal vége
  const flat = flatLines();
  const songEnd = parseFloat(document.getElementById('songEnd').value) || 0;
  flat.forEach((item, i) => {
    let end = songEnd;
    for (let j = i + 1; j < flat.length; j++) {
      if (flat[j].l.start !== null) { end = flat[j].l.start; break; }
    }
    item.end = end;
    item.timed = item.l.start !== null;
  });
  return flat;
}

function render(){
  const flat = computeEnds();
  const container = document.getElementById('verseList');
  container.innerHTML = '';
  let idx = 0;
  verses.forEach((v, vi) => {
    const vDiv = document.createElement('div');
    vDiv.className = 'bg-white border rounded-xl p-3';
    const titleInput = document.createElement('input');
    titleInput.value = v.title;
    titleInput.className = 'w-full border-b p-1 mb-2 font-bold text-violet-700 text-sm';
    titleInput.onchange = (e) => { v.title = e.target.value; };
    vDiv.appendChild(titleInput);

    v.lines.forEach((l, li) => {
      const item = flat[idx++];
      const row = document.createElement('div');
      row.id = `row-${vi}-${li}`;
      row.className = 'border rounded-lg p-2 mb-1' + (item.timed ? '' : ' bg-slate-50');
      const startVal = l.start === null ? '' : l.start;
      row.innerHTML = `
        <div class="flex items-center gap-2 mb-1.5">
          <input type="number" step="0.1" placeholder="--" value="${startVal}" class="w-16 border p-1.5 rounded text-sm flex-shrink-0" data-vi="${vi}" data-li="${li}" onchange="updateStart(this)">
          <button class="bg-yellow-500 text-white px-3 py-1.5 rounded text-xs font-bold flex-shrink-0" data-vi="${vi}" data-li="${li}" onclick="captureNow(this)">MOST</button>
          <span class="text-xs text-slate-400 flex-shrink-0">→ ${item.timed || item.end ? item.end.toFixed(1) : '--'}</span>
        </div>
        <div class="text-sm sm:text-base leading-snug break-words">${l.text.replace(/\*\*(.*?)\*\*/g,'<b class="text-violet-600">$1</b>')}</div>
        <input value="${l.hungarian}" class="w-full text-xs sm:text-sm text-slate-400 border-b mt-1 py-0.5" data-vi="${vi}" data-li="${li}" onchange="updateHu(this)">
      `;
      vDiv.appendChild(row);
    });
    container.appendChild(vDiv);
  });
  exportData();
}

function updateStart(el){
  const vi = el.dataset.vi, li = el.dataset.li;
  verses[vi].lines[li].start = el.value === '' ? null : (parseFloat(el.value) || 0);
  render();
}
function updateHu(el){
  const vi = el.dataset.vi, li = el.dataset.li;
  verses[vi].lines[li].hungarian = el.value;
  exportData();
}
function captureNow(btn){
  const vi = btn.dataset.vi, li = btn.dataset.li;
  verses[vi].lines[li].start = parseFloat(audio.currentTime.toFixed(1));
  render();
}

function highlightActive(){
  const flat = computeEnds();
  document.querySelectorAll('.active-line').forEach(n => n.classList.remove('active-line'));
  const t = audio.currentTime;
  const hit = flat.find(item => item.timed && t >= item.l.start && t < item.end);
  if (hit){
    const el = document.getElementById(`row-${hit.vi}-${hit.li}`);
    if (el){ el.classList.add('active-line'); el.scrollIntoView({behavior:'smooth', block:'center'}); }
  }
}

function jsStr(s){ return JSON.stringify(s || ''); }

function exportData(){
  const flat = computeEnds();
  const untimed = flat.filter(item => !item.timed).length;
  let idx = 0;
  const versesText = verses.map(v => {
    const vStart = (v.lines[0] && v.lines[0].start !== null) ? v.lines[0].start : 0;
    const vLinesText = v.lines.map(l => {
      const item = flat[idx++];
      const startOut = l.start === null ? 0 : l.start;
      return `      { text: ${jsStr(l.text)}, hungarian: ${jsStr(l.hungarian)}, start: ${startOut}, end: ${item.end.toFixed(1)} }`;
    }).join(',\n');
    const vEnd = flat[idx - 1] ? flat[idx - 1].end.toFixed(1) : 0;
    return `  {\n    title: ${jsStr(v.title)}, start: ${vStart}, end: ${vEnd},\n    lines: [\n${vLinesText}\n    ]\n  }`;
  }).join(',\n');
  const warning = untimed > 0 ? `// ⚠️ FIGYELEM: ${untimed} sor még NINCS időzítve (0-ra állítva)!\n` : '';

  const id = document.getElementById('songId').value.trim() || 'uj-dal';
  const title = document.getElementById('songTitle').value.trim() || 'Új Dal';
  const mp3 = document.getElementById('mp3name').value.trim() || 'fajl.mp3';
  const fallback = document.getElementById('fallback').value.trim();

  const full = `${warning}{
  id: ${jsStr(id)},
  title: ${jsStr(title)},
  localAudio: ${jsStr(mp3)},
  fallbackAudio: ${jsStr(fallback)},

  cardsData: [
    // ide jönnek a tanuló kártyák kézzel, ha kellenek
  ],

  songStructureData: [
${versesText}
  ]
}`;
  document.getElementById('exportArea').value = full;
}

function copyExport(){
  exportData();
  const area = document.getElementById('exportArea');
  area.select();
  document.execCommand('copy');
  alert('Kimásolva! Illeszd be az adat.js megfelelő "songs" tömbjébe.');
}
</script>
</body>
</html>
